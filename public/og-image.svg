  <text x="600" y="305" text-anchor="middle"
        font-family="'EB Garamond', Garamond, 'Times New Roman', serif"
        font-size="128" font-weight="500"
        fill="#fff" letter-spacing="-2">If 1800 Had X</text>

  <text x="600" y="395" text-anchor="middle"
        font-family="'EB Garamond', Garamond, 'Times New Roman', serif"
        font-style="italic" font-size="34"
        fill="rgba(232,233,234,0.85)">An interactive playthrough of the most savage</text>
  <text x="600" y="438" text-anchor="middle"
        font-family="'EB Garamond', Garamond, 'Times New Roman', serif"
        font-style="italic" font-size="34"
        fill="rgba(232,233,234,0.85)">presidential campaign in American history.</text>

  <line x1="540" y1="488" x2="660" y2="488" stroke="rgba(220,200,160,0.4)" stroke-width="1"/>

  <text x="600" y="525" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
        font-size="15" letter-spacing="4"
        fill="rgba(255,255,255,0.55)">EVERY DIRECT QUOTATION VERBATIM</text>
