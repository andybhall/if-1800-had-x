<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#000"/>
    </linearGradient>
    <pattern id="lines" width="100%" height="14" patternUnits="userSpaceOnUse">
      <rect width="1200" height="1" fill="rgba(220,200,160,0.025)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#lines)"/>
  <rect x="50" y="50" width="1100" height="530" fill="none" stroke="rgba(220,200,160,0.18)" stroke-width="1.5"/>
  <rect x="58" y="58" width="1084" height="514" fill="none" stroke="rgba(220,200,160,0.10)" stroke-width="1"/>

  <text x="600" y="120" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', sans-serif"
